name: iOS CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    env:
      API_KEY: ${{ secrets.API_KEY }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: 17

      - name: Grant permission to gradlew
        run: chmod +x ./gradlew

      - name: Create Secrets.plist
        run: |
          cat > iosApp/iosApp/Secrets.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>apiUrl</key>
              <string>${{ secrets.API_BASE_URL }}</string>
              <key>apiKey</key>
              <string>${{ secrets.API_KEY }}</string>
          </dict>
          </plist>
          PLIST

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build iOS (KMP Kotlin/Native)
        run: ./gradlew :composeApp:compileKotlinIosArm64

      - name: Build iosApp via Xcode
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -configuration Debug \
            build

      - name: Run iOS/CommonMain unit tests
        run: ./gradlew iosSimulatorArm64Test
